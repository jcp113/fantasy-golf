databases:
  - name: fantasy-golf-db
    plan: free
    databaseName: fantasy_golf
    user: fantasy_golf_user

services:
  - type: web
    name: fantasy-golf
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fantasy-golf-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
